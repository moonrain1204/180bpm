<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BPM 180 節拍器與倒數計時 v1.0.3</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .timer-display { font-size: 30px; margin: 20px; font-weight: bold; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; }
        .btn-time { background-color: #e0e0e0; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>BPM 180 節拍器</h1>
    <div class="timer-display" id="timer">00:00</div>
    
    <div>
        <button onclick="startMetronome(10)">10 分鐘</button>
        <button onclick="startMetronome(15)">15 分鐘</button>
        <button onclick="startMetronome(20)">20 分鐘</button>
        <button onclick="startMetronome(25)">25 分鐘</button>
        <button onclick="startMetronome(30)">30 分鐘</button>
    </div>
    <br>
    <button onclick="stopMetronome()" style="background-color: #ff4757; color: white;">停止</button>

    <script>
        // 版本號：1.0.3
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let metroInterval = null;
        let countdownInterval = null;
        let timeRemaining = 0;

        function playClick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            // 調整音頻模擬您提供的節拍聲音色
            osc.type = 'square'; 
            osc.frequency.value = 440; 
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function startMetronome(minutes) {
            stopMetronome();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            timeRemaining = minutes * 60;
            updateDisplay();

            metroInterval = setInterval(playClick, 333.33); // 180 BPM
            countdownInterval = setInterval(() => {
                timeRemaining--;
                updateDisplay();
                if (timeRemaining <= 0) stopMetronome();
            }, 1000);
        }

        function stopMetronome() {
            clearInterval(metroInterval);
            clearInterval(countdownInterval);
            metroInterval = null;
            timeRemaining = 0;
            updateDisplay();
        }

        function updateDisplay() {
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            document.getElementById('timer').innerText = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
