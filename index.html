<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM 180 節拍器 v1.0.7</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .timer-display { font-size: 60px; margin: 20px; font-weight: bold; color: #333; }
        .info-panel { font-size: 18px; color: #555; margin-bottom: 10px; }
        button { 
            padding: 20px 30px; 
            font-size: 20px; 
            margin: 8px; 
            cursor: pointer; 
            border-radius: 12px;
            border: 1px solid #ccc;
            background-color: #fff;
            width: 40%;
            max-width: 200px;
        }
        .btn-time { background-color: #f0f0f0; }
        .btn-control { background-color: #4CAF50; color: white; border: none; width: 85%; max-width: 400px; }
        .btn-stop { background-color: #ff4757; color: white; border: none; width: 85%; max-width: 400px; }
    </style>
</head>
<body>
    <h1>BPM 180 節拍器</h1>
    <div class="info-panel" id="totalTime">設定時長：--</div>
    <div class="info-panel" id="endTime">預計結束時間：--</div>
    <div class="timer-display" id="timer">00:00</div>
    
    <div>
        <button class="btn-time" onclick="startMetronome(10)">10 分</button>
        <button class="btn-time" onclick="startMetronome(15)">15 分</button>
        <button class="btn-time" onclick="startMetronome(20)">20 分</button>
        <button class="btn-time" onclick="startMetronome(25)">25 分</button>
        <button class="btn-time" onclick="startMetronome(30)">30 分</button>
        <button class="btn-time" onclick="startMetronome(45)">45 分</button>
        <button class="btn-time" onclick="startMetronome(60)">60 分</button>
    </div>
    <br>
    <button class="btn-control" id="pauseBtn" onclick="togglePause()">暫停 / 繼續</button>
    <button class="btn-stop" onclick="stopMetronome()">完全停止 (歸零)</button>

    <script>
        // 版本號：1.0.7
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let metroInterval = null;
        let countdownInterval = null;
        let timeRemaining = 0;
        let isPaused = false;

        function playClick() {
            if (isPaused) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square'; 
            osc.frequency.value = 440; 
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function startMetronome(minutes) {
            stopMetronome();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            let totalDuration = minutes * 60;
            timeRemaining = totalDuration;
            isPaused = false;
            
            const now = new Date();
            const end = new Date(now.getTime() + totalDuration * 1000);
            const endTimeStr = end.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            
            document.getElementById('totalTime').innerText = `總時長：${minutes} 分鐘`;
            document.getElementById('endTime').innerText = `預計結束時間：${endTimeStr}`;
            
            updateDisplay();

            metroInterval = setInterval(() => {
                if (!isPaused) playClick();
            }, 333.33);

            countdownInterval = setInterval(() => {
                if (!isPaused) {
                    timeRemaining--;
                    updateDisplay();
                    if (timeRemaining <= 0) stopMetronome();
                }
            }, 1000);
        }

        function togglePause() {
            if (timeRemaining > 0) {
                isPaused = !isPaused;
                if (!isPaused && audioCtx.state === 'suspended') audioCtx.resume();
            }
        }

        function stopMetronome() {
            clearInterval(metroInterval);
            clearInterval(countdownInterval);
            metroInterval = null;
            isPaused = false;
            timeRemaining = 0;
            document.getElementById('totalTime').innerText = `設定時長：--`;
            document.getElementById('endTime').innerText = `預計結束時間：--`;
            updateDisplay();
        }

        function updateDisplay() {
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            document.getElementById('timer').innerText = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
