<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM 180 節拍器 v1.0.4</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .timer-display { font-size: 60px; margin: 30px; font-weight: bold; color: #333; }
        /* 放大按鈕設計 */
        button { 
            padding: 25px 40px; 
            font-size: 22px; 
            margin: 10px; 
            cursor: pointer; 
            border-radius: 12px;
            border: 1px solid #ccc;
            background-color: #fff;
            width: 80%;
            max-width: 400px;
        }
        .btn-time { background-color: #f0f0f0; }
        .btn-control { background-color: #4CAF50; color: white; border: none; }
        .btn-stop { background-color: #ff4757; color: white; border: none; }
    </style>
</head>
<body>
    <h1>BPM 180 節拍器</h1>
    <div class="timer-display" id="timer">00:00</div>
    
    <div>
        <button class="btn-time" onclick="startMetronome(10)">10 分鐘</button>
        <button class="btn-time" onclick="startMetronome(15)">15 分鐘</button>
        <button class="btn-time" onclick="startMetronome(20)">20 分鐘</button>
        <button class="btn-time" onclick="startMetronome(25)">25 分鐘</button>
        <button class="btn-time" onclick="startMetronome(30)">30 分鐘</button>
    </div>
    <br>
    <button class="btn-control" id="pauseBtn" onclick="togglePause()">暫停 / 繼續</button>
    <button class="btn-stop" onclick="stopMetronome()">完全停止 (歸零)</button>

    <script>
        // 版本號：1.0.4
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let metroInterval = null;
        let countdownInterval = null;
        let timeRemaining = 0;
        let isPaused = false;

        function playClick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square'; 
            osc.frequency.value = 440; 
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function startMetronome(minutes) {
            stopMetronome();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            timeRemaining = minutes * 60;
            isPaused = false;
            updateDisplay();

            metroInterval = setInterval(playClick, 333.33);
            countdownInterval = setInterval(() => {
                if (!isPaused) {
                    timeRemaining--;
                    updateDisplay();
                    if (timeRemaining <= 0) stopMetronome();
                }
            }, 1000);
        }

        function togglePause() {
            if (timeRemaining > 0) isPaused = !isPaused;
        }

        function stopMetronome() {
            clearInterval(metroInterval);
            clearInterval(countdownInterval);
            metroInterval = null;
            isPaused = false;
            timeRemaining = 0;
            updateDisplay();
        }

        function updateDisplay() {
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            document.getElementById('timer').innerText = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
